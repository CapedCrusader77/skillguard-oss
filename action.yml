name: 'SkillGuard OSS Scanner'
description: 'Trust but Verify for AI Agent Skills, MCP Servers, and Plugins'
branding:
  icon: 'shield'
  color: 'blue'
inputs:
  trust_threshold:
    description: 'Minimum acceptable trust score (0-100) before failing the build'
    required: false
    default: '85'
  fail_on_critical:
    description: 'Whether to fail the build if any CRITICAL security findings are detected (true/false)'
    required: false
    default: 'true'
  report_format:
    description: 'Format of the generated report (json, html, or both)'
    required: false
    default: 'both'
  github_token:
    description: 'GitHub token for posting comments (defaults to github.token)'
    required: false
    default: ${{ github.token }}
outputs:
  trust_score:
    description: 'The overall trust score of the scanned repositories'
    value: ${{ steps.run-scan.outputs.trust_score }}
  risk_score:
    description: 'The overall risk score of the scanned repositories'
    value: ${{ steps.run-scan.outputs.risk_score }}
  report_path:
    description: 'Local file path to the generated JSON report'
    value: ${{ steps.run-scan.outputs.report_path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '>=3.12'

    - name: Install SkillGuard
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install .

    - name: Run SkillGuard Scan
      id: run-scan
      shell: bash
      env:
        TRUST_THRESHOLD: ${{ inputs.trust_threshold }}
        FAIL_ON_CRITICAL: ${{ inputs.fail_on_critical }}
      run: |
        echo "Running SkillGuard Scan..."
        # Compile report options
        OPTS="--json"
        if [ "${{ inputs.report_format }}" = "html" ] || [ "${{ inputs.report_format }}" = "both" ]; then
          OPTS="$OPTS --html"
        fi
        
        # We run the scan on the current repository root directory
        # We catch the exit code because we might want to fail later in the script
        # after posting the PR comment
        python -m skillguard.app scan . $OPTS --output report.json || SCAN_EXIT=$?
        
        # Save output values for GitHub Actions steps
        if [ -f report.json ]; then
          TRUST_SCORE=$(python -c "import json; data=json.load(open('report.json')); print(data.get('portfolio_summary', {}).get('overall_trust_score', data.get('trust_score', {}).get('overall_score', 100)))")
          RISK_SCORE=$(python -c "import json; data=json.load(open('report.json')); print(data.get('portfolio_summary', {}).get('overall_risk_score', data.get('score', 0)))")
        else
          TRUST_SCORE=100
          RISK_SCORE=0
        fi
        
        echo "trust_score=$TRUST_SCORE" >> $GITHUB_OUTPUT
        echo "risk_score=$RISK_SCORE" >> $GITHUB_OUTPUT
        echo "report_path=report.json" >> $GITHUB_OUTPUT
        
        echo "Scan completed. Trust Score: $TRUST_SCORE, Risk Score: $RISK_SCORE"

    - name: Post PR Comment
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        if [ -f report.json ]; then
          echo "Generating PR comment..."
          python .github/scripts/post_comment.py
        else
          echo "No report.json found to post comment."
        fi

    - name: Evaluate Build Gates
      shell: bash
      env:
        TRUST_THRESHOLD: ${{ inputs.trust_threshold }}
        FAIL_ON_CRITICAL: ${{ inputs.fail_on_critical }}
      run: |
        if [ -f report.json ]; then
          # Check trust score gate
          TRUST_SCORE=$(python -c "import json; data=json.load(open('report.json')); print(data.get('portfolio_summary', {}).get('overall_trust_score', data.get('trust_score', {}).get('overall_score', 100)))")
          if [ "$TRUST_SCORE" -lt "$TRUST_THRESHOLD" ]; then
            echo "::error::Build failed because Overall Trust Score ($TRUST_SCORE) is below threshold ($TRUST_THRESHOLD)."
            exit 1
          fi
          
          # Check critical findings gate
          if [ "$FAIL_ON_CRITICAL" = "true" ]; then
            CRITICAL_COUNT=$(python -c "import json; data=json.load(open('report.json')); print(sum(1 for f in data.get('findings', []) if f.get('severity', '').upper() == 'CRITICAL'))")
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "::error::Build failed because $CRITICAL_COUNT critical security findings were detected."
              exit 1
            fi
          fi
        fi
        echo "All build gates passed successfully!"
